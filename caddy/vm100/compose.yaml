name: caddy-lan

volumes:
  data:
    name: caddy-vm100_data
  config:
    name: caddy-vm100_config

networks:
  caddy-internal:
    name: caddy-internal

services:
  caddy:
    build: ..
    container_name: caddy-vm100
    environment:
      - DOMAIN
      - API_KEY
      - SECRET_KEY
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - data:/data
      - config:/config
    networks:
      - caddy-internal
