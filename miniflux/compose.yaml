name: miniflux

volumes:
  miniflux-db:

networks:
  miniflux-caddy:
    name: miniflux-caddy

services:
  miniflux:
    image: miniflux/miniflux:2.2.17
    container_name: miniflux
    restart:
      unless-stopped
    networks:
      - miniflux-caddy
      - default
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://miniflux:${PG_PASSWORD}@db/miniflux?sslmode=disable
      - RUN_MIGRATIONS=1
      - CREATE_ADMIN=1
      - ADMIN_USERNAME=${MF_USERNAME}
      - ADMIN_PASSWORD=${MF_PASSWORD}
      - BASE_URL=https://miniflux.${DOMAIN}
  db:
    image: postgres:15
    container_name: miniflux-pg
    networks:
      - default
    environment:
      - POSTGRES_USER=${PG_USERNAME}
      - POSTGRES_PASSWORD=${PG_PASSWORD}
      - POSTGRES_DB=miniflux
    volumes:
      - miniflux-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "miniflux"]
      interval: 10s
      start_period: 30s