log:
  level: ERROR

accesslog:
  fields:
    names:
      StartUTC: drop

api:
  dashboard: true

providers:
  docker:
    exposedByDefault: false
  file:
    directory: /etc/traefik
    watch: true

entryPoints:
  web:
    address: :80
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: :443
    asDefault: true
    http:
      tls:
        certResolver: letsencrypt

certificatesResolvers:
  letsencrypt:
    acme:
      # email: defined in Compose, no env vars here
      tlsChallenge: {}
      storage: /letsencrypt/acme.json
