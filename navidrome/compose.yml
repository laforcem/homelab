name: navidrome

networks:
  navidrome-caddy:
    name: navidrome-caddy

volumes:
  data:
    name: navidrome-data
  audiomuse-postgres-data:
  audiomuse-redis-data:
  audiomuse-temp-audio-flask:
  audiomuse-temp-audio-worker:

services:
  audiomuse-redis:
    image: redis:7-alpine
    container_name: audiomuse-redis
    networks:
      - navidrome-caddy
    volumes:
      - audiomuse-redis-data:/data
    restart: unless-stopped

  audiomuse-postgres:
    image: postgres:15-alpine
    container_name: audiomuse-postgres
    networks:
      - navidrome-caddy
    environment:
      - POSTGRES_USER=${AUDIOMUSE_POSTGRES_USER:-audiomuse}
      - POSTGRES_PASSWORD=${AUDIOMUSE_POSTGRES_PASSWORD}
      - POSTGRES_DB=audiomusedb
    volumes:
      - audiomuse-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  audiomuse-ai-flask:
    image: ghcr.io/neptunehub/audiomuse-ai:latest
    container_name: audiomuse-ai-flask-app
    networks:
      - navidrome-caddy
    environment:
      - SERVICE_TYPE=flask
      - TZ=America/Denver
      - POSTGRES_USER=${AUDIOMUSE_POSTGRES_USER:-audiomuse}
      - POSTGRES_PASSWORD=${AUDIOMUSE_POSTGRES_PASSWORD}
      - POSTGRES_DB=audiomusedb
      - POSTGRES_HOST=audiomuse-postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://audiomuse-redis:6379/0
      - TEMP_DIR=/app/temp_audio
      - MEDIASERVER_TYPE=navidrome
      - NAVIDROME_URL=http://navidrome:4533
      - NAVIDROME_USER=${AUDIOMUSE_NAVIDROME_USER:-audiomuse}
      - NAVIDROME_PASSWORD=${AUDIOMUSE_NAVIDROME_PASSWORD}
      - AUDIOMUSE_USER=${AUDIOMUSE_ADMIN_USER:-admin}
      - AUDIOMUSE_PASSWORD=${AUDIOMUSE_ADMIN_PASSWORD}
      - JWT_SECRET=${AUDIOMUSE_JWT_SECRET}
      - AUTH_ENABLED=True
    volumes:
      - audiomuse-temp-audio-flask:/app/temp_audio
    depends_on:
      - audiomuse-redis
      - audiomuse-postgres
    restart: unless-stopped

  audiomuse-ai-worker:
    image: ghcr.io/neptunehub/audiomuse-ai:latest
    container_name: audiomuse-ai-worker-instance
    networks:
      - navidrome-caddy
    environment:
      - SERVICE_TYPE=worker
      - TZ=America/Denver
      - POSTGRES_USER=${AUDIOMUSE_POSTGRES_USER:-audiomuse}
      - POSTGRES_PASSWORD=${AUDIOMUSE_POSTGRES_PASSWORD}
      - POSTGRES_DB=audiomusedb
      - POSTGRES_HOST=audiomuse-postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://audiomuse-redis:6379/0
      - TEMP_DIR=/app/temp_audio
      - MEDIASERVER_TYPE=navidrome
      - NAVIDROME_URL=http://navidrome:4533
      - NAVIDROME_USER=${AUDIOMUSE_NAVIDROME_USER:-audiomuse}
      - NAVIDROME_PASSWORD=${AUDIOMUSE_NAVIDROME_PASSWORD}
      - AUDIOMUSE_USER=${AUDIOMUSE_ADMIN_USER:-admin}
      - AUDIOMUSE_PASSWORD=${AUDIOMUSE_ADMIN_PASSWORD}
      - JWT_SECRET=${AUDIOMUSE_JWT_SECRET}
      - AUTH_ENABLED=True
    volumes:
      - audiomuse-temp-audio-worker:/app/temp_audio
    depends_on:
      - audiomuse-redis
      - audiomuse-postgres
    restart: unless-stopped

  audiomuseai-plugin-fetch:
    image: curlimages/curl:8.11.1
    container_name: audiomuseai-plugin-fetch
    user: root
    environment:
      - AUDIOMUSEAI_PLUGIN_VERSION=${AUDIOMUSEAI_PLUGIN_VERSION:-v8}
    volumes:
      - data:/data
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -e
        mkdir -p /data/plugins
        installed="$$(cat /data/plugins/audiomuseai.version 2>/dev/null || true)"
        if [ "$$installed" != "$$AUDIOMUSEAI_PLUGIN_VERSION" ]; then
          curl -fsSL -o /data/plugins/audiomuseai.ndp "https://github.com/NeptuneHub/AudioMuse-AI-NV-plugin/releases/download/$$AUDIOMUSEAI_PLUGIN_VERSION/audiomuseai.ndp"
          echo "$$AUDIOMUSEAI_PLUGIN_VERSION" > /data/plugins/audiomuseai.version
        fi

  navidrome:
    image: deluan/navidrome:0.62.0
    container_name: navidrome
    restart: unless-stopped
    depends_on:
      audiomuseai-plugin-fetch:
        condition: service_completed_successfully
    networks:
      - navidrome-caddy
    volumes:
      - data:/data
      - /mnt/lab/music:/music:ro
    environment:
      - TZ=America/Denver
      - ND_MUSICFOLDER=/music
      - ND_DATAFOLDER=/data
      - ND_SCANSCHEDULE=@every 24h
      - ND_AGENTS=deezer,listenbrainz,lastfm,audiomuseai
      - ND_LASTFM_APIKEY=${LASTFM_API_KEY}
      - ND_LASTFM_SECRET=${LASTFM_SECRET}
      - ND_LASTFM_SCROBBLEFIRSTARTISTONLY=true
      - ND_PLUGINS_ENABLED=true
      - ND_PLUGINS_AUTORELOAD=true
      - ND_DEVARTISTINFOTIMETOLIVE=1s
  feishin:
    container_name: feishin
    image: 'ghcr.io/jeffvli/feishin:1.13'
    restart: unless-stopped
    networks:
      - navidrome-caddy
    environment:
        - SERVER_NAME=navidrome 
        - SERVER_TYPE=navidrome
        - SERVER_LOCK=true
        - SERVER_URL=https://nd.${DOMAIN}
        - REMOTE_URL=https://music.${DOMAIN}
        - LEGACY_AUTHENTICATION=false
        - ANALYTICS_DISABLED=true
