services:
  portainer_agent:
    image: portainer/agent:2.40.0
    container_name: portainer_agent
    restart: always
    ports:
      - "9001:9001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
      - /:/host
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "https://localhost:9001/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
