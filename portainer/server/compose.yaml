networks:
  default:
    name: portainer_network
  caddy-internal:
    name: caddy-internal
    external: true

volumes:
  portainer_data:
    name: portainer_data

services:
  portainer:
    container_name: portainer
    image: portainer/portainer-ce:sts
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    ports:
      - 8000:8000  # Remove if you do not intend to use Edge Agents
    networks:
      - caddy-internal

