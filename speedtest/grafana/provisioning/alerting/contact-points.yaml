apiVersion: 1
contactPoints:
  - orgId: 1
    name: Telegram
    receivers:
      - uid: telegram-speedtest
        type: telegram
        settings:
          bottoken: ${TELEGRAM_BOT_TOKEN}
          chatid: "${TELEGRAM_CHAT_ID}"
          message: |
            ⚠️ No speedtest data received in the last 30 minutes.
            Check the speedtest-tracker container on vm100.
        disableResolveMessage: false
